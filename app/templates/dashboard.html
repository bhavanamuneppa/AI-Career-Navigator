<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Student Records Dashboard</h1>
    <form method="GET">

    <input type="text"
           name="search"
           placeholder="Search Career">

    <button type="submit">
        Search
    </button>

</form>

<br>

    <table border="1" cellpadding="10" cellspacing="0">

        <tr>
            <th>ID</th>
            <th>CGPA</th>
            <th>Career</th>
            <th>Score</th>
            <th>Result</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.cgpa }}</td>
            <td>{{ student.career }}</td>
            <td>{{ student.placement_score }}%</td>
            <td>{{ student.result }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
